services:
  - type: web
    name: advisys-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PORT
        value: "4000"
      - key: DB_ENABLE_SSL
        value: "true"
      # The following variables must be populated manually in the Render dashboard
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
